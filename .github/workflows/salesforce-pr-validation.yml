name: Validate Pull Request

# Validates Salesforce metadata changes without deploying
# Runs Apex tests and checks for deployment errors

on:
  pull_request:
    branches:
      - main
      - master
      - dev
    paths:
      - 'volunteer-registration/force-app/**'
      - '.github/workflows/**'

jobs:
  validate:
    name: Validate Metadata
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: |
          echo "Installing Salesforce CLI..."
          wget https://developer.salesforce.com/media/salesforce-cli/sf/channels/stable/sf-linux-x64.tar.xz
          mkdir -p ~/cli/sf
          tar xJf sf-linux-x64.tar.xz -C ~/cli/sf --strip-components 1
          echo "$HOME/cli/sf/bin" >> $GITHUB_PATH

      - name: Verify Salesforce CLI
        run: sf --version

      - name: Authenticate to Salesforce
        run: |
          echo "Authenticating to Salesforce..."
          echo "${{ secrets.SFDX_AUTH_URL }}" > ./SFDX_AUTH_URL.txt
          sf org login sfdx-url --sfdx-url-file ./SFDX_AUTH_URL.txt --alias target-org --set-default
          rm ./SFDX_AUTH_URL.txt
          echo "✅ Authentication successful"
        working-directory: ./volunteer-registration

      - name: Validate Deployment (Dry Run)
        run: |
          echo "🔍 Validating deployment without making changes..."
          sf project deploy start \
            --source-dir force-app/default \
            --dry-run \
            --wait 20 \
            --verbose \
            --test-level RunLocalTests
          echo "✅ Validation successful - no deployment errors"
        working-directory: ./volunteer-registration

      - name: Run Apex Tests
        run: |
          echo "🧪 Running Apex tests..."
          sf apex run test \
            --wait 10 \
            --result-format human \
            --code-coverage \
            --test-level RunLocalTests
          echo "✅ All tests passed"
        working-directory: ./volunteer-registration

      - name: Validation Summary
        if: always()
        run: |
          echo "========================================"
          echo "📊 VALIDATION SUMMARY"
          echo "========================================"
          echo "✅ Metadata validation completed"
          echo "✅ Apex tests completed"
          echo ""
          echo "This PR is safe to merge ✅"
          echo "========================================"

