# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - volunteer-management-app

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: Branch to deploy (defaults to sales-force-poc)
        required: false

env:
  DEPLOY_BRANCH: sales-force-poc

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_branch || env.DEPLOY_BRANCH) || env.DEPLOY_BRANCH }}

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DCBC2F780F8E4180A0615AF2927218FA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0ED50A45CB144E80B41C86A5932AB484 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D8757B7AFB3942B19384273E8AAB284E }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'volunteer-management-app'
          slot-name: 'Production'
          package: .
      
      - name: Verify deployment login
        env:
          BASE_URL: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
          LOGIN_EMAIL: ${{ secrets.DEPLOYMENT_LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.DEPLOYMENT_LOGIN_PASSWORD }}
        run: |
          set -euo pipefail
          BASE_URL="${BASE_URL:-}"
          LOGIN_EMAIL="${LOGIN_EMAIL:-}"
          LOGIN_PASSWORD="${LOGIN_PASSWORD:-}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="https://volunteer-management-app.azurewebsites.net"
          fi
          BASE_URL="${BASE_URL%/}"
          missing_secrets=()
          if [ -z "$LOGIN_EMAIL" ]; then
            missing_secrets+=("DEPLOYMENT_LOGIN_EMAIL")
          fi
          if [ -z "$LOGIN_PASSWORD" ]; then
            missing_secrets+=("DEPLOYMENT_LOGIN_PASSWORD")
          fi
          if [ "${#missing_secrets[@]}" -ne 0 ]; then
            echo "Missing required secrets: ${missing_secrets[*]}"
            exit 1
          fi
          payload_file="$(mktemp)"
          chmod 600 "$payload_file"
          cleanup() {
            rm -f "$payload_file"
          }
          trap cleanup EXIT
          cat > "$payload_file" <<EOF
          {"email":"${LOGIN_EMAIL}","password":"${LOGIN_PASSWORD}"}
          EOF
          response=$(curl -s -w "\n%{http_code}" -X POST "${BASE_URL}/auth/login" \
            -H "Content-Type: application/json" \
            --data-binary @"$payload_file")
          status="${response##*$'\n'}"
          body="${response%$'\n'*}"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Login check failed with status $status"
            sanitized_body=$(echo "$body" | sed -E \
              -e 's/[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+/[REDACTED_JWT]/g' \
              -e 's/"(token|access_token|refresh_token)"[[:space:]]*:[[:space:]]*"[^"]*"/"\1":"[REDACTED]"/g')
            if [ -n "$sanitized_body" ]; then
              printf 'Response body (sanitized, truncated): %s\n' "${sanitized_body:0:500}"
            fi
            exit 1
          fi
          echo "Login check succeeded with status $status"
          
