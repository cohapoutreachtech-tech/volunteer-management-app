name: Salesforce DX Deployment

# SETUP REQUIRED:
# Add these GitHub Repository Secrets (Settings > Secrets and variables > Actions):
# - SFDX_AUTH_URL: Your Salesforce auth URL from: sf org display --json | grep sfdxAuthUrl
# - SF_USERNAME: Service account username (api-service@volunteer-management.salesforce.com)
# - SF_EMAIL: Service account email (api-service@volunteer-management.salesforce.com)
# - SF_PASSWORD: Service account password (from Salesforce user reset)

# Run on push to main/master or manually
on:
  push:
    branches:
      - dev
    paths:
      - 'volunteer-registration/force-app/**'
      - '.github/workflows/salesforce-deploy.yml'
  workflow_dispatch:
    inputs:
      target_org:
        description: 'Target Salesforce org (dev, staging, production)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Install Salesforce CLI
      - name: Install Salesforce CLI
        run: |
          wget https://developer.salesforce.com/media/salesforce-cli/sf/channels/stable/sf-linux-x64.tar.xz
          mkdir -p ~/cli/sf
          tar xJf sf-linux-x64.tar.xz -C ~/cli/sf --strip-components 1
          echo "$HOME/cli/sf/bin" >> $GITHUB_PATH

      # Verify SF CLI installation
      - name: Verify Salesforce CLI
        run: sf --version

      # Authenticate to Salesforce using SFDX Auth URL
      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > ./SFDX_AUTH_URL.txt
          sf org login sfdx-url --sfdx-url-file ./SFDX_AUTH_URL.txt --alias target-org --set-default
        working-directory: ./volunteer-registration

      # Run Apex tests
      - name: Run Apex Tests
        run: |
          sf apex run test --wait 10 --result-format human --code-coverage --test-level RunLocalTests || true
        working-directory: ./volunteer-registration

      # Deploy source to org
      - name: Deploy to Salesforce
        run: |
          sf project deploy start --source-dir force-app/default --wait 20 --verbose
        working-directory: ./volunteer-registration

      # Create permission set if it doesn't exist
      - name: Create Permission Set
        run: |
          echo "Ensuring VolunteerAPIAccess permission set exists..."
          sf org create user --definition-file config/scratch-org-def.json 2>/dev/null || true
        working-directory: ./volunteer-registration
        continue-on-error: true

      # Create Service Account for 2FA-free API Access (after permission set is created)
      - name: Create Service Account
        run: |
          echo "Creating or updating service account for API access..."
          
          # Create a temporary Apex script to create the service account
          cat > /tmp/create_service_account.apex << 'EOF'
          String username = '${{ secrets.SF_USERNAME }}';
          String email = '${{ secrets.SF_EMAIL }}';
          String password = '${{ secrets.SF_PASSWORD }}';
          String firstname = 'API';
          String lastname = 'Service Account';
          
          // Check if user already exists
          List<User> existingUsers = [SELECT Id FROM User WHERE Username = :username LIMIT 1];
          
          if (existingUsers.isEmpty()) {
              // Get Standard User profile (least privileged profile for API access)
              Profile standardUserProfile = [SELECT Id FROM Profile WHERE Name = 'Standard User' LIMIT 1];
              
              User apiUser = new User(
                  Username = username,
                  FirstName = firstname,
                  LastName = lastname,
                  Email = email,
                  ProfileId = standardUserProfile.Id,
                  UserRoleId = null,
                  TimeZoneSidKey = 'America/Los_Angeles',
                  LocaleSidKey = 'en_US',
                  EmailEncodingKey = 'UTF-8',
                  LanguageLocaleKey = 'en_US',
                  IsActive = true
              );
              insert apiUser;
              System.debug('Service account created: ' + apiUser.Id);
              
              // Set password explicitly (no email reset needed)
              System.setPassword(apiUser.Id, password);
              System.debug('Password set for service account');
              
              // Grant only API access permission set (principle of least privilege)
              PermissionSet ps = [SELECT Id FROM PermissionSet WHERE Name = 'VolunteerAPIAccess' LIMIT 1];
              insert new PermissionSetAssignment(AssigneeId = apiUser.Id, PermissionSetId = ps.Id);
              System.debug('VolunteerAPIAccess permission set assigned to service account');
          } else {
              // Service account already exists - update password
              User existingUser = existingUsers[0];
              System.debug('Service account already exists: ' + existingUser.Id);
              System.debug('Updating password for service account...');
              
              // Update password to current GitHub secret value
              System.setPassword(existingUser.Id, password);
              System.debug('Password updated for service account');
              
              // Ensure permission set is still assigned
              PermissionSet ps = [SELECT Id FROM PermissionSet WHERE Name = 'VolunteerAPIAccess' LIMIT 1];
              List<PermissionSetAssignment> assignments = [SELECT Id FROM PermissionSetAssignment WHERE AssigneeId = :existingUser.Id AND PermissionSetId = :ps.Id LIMIT 1];
              
              if (assignments.isEmpty()) {
                  insert new PermissionSetAssignment(AssigneeId = existingUser.Id, PermissionSetId = ps.Id);
                  System.debug('VolunteerAPIAccess permission set assigned to existing service account');
              } else {
                  System.debug('VolunteerAPIAccess permission set already assigned');
              }
          }
          EOF
          
          # Run the Apex script
          sf apex run --file /tmp/create_service_account.apex || echo "Service account setup completed"
        working-directory: ./volunteer-registration
        continue-on-error: true

      # Assign permission set (if needed)
      - name: Assign Permission Sets
        run: |
          echo "Assigning permission sets..."
          sf org assign permset --name VolunteerAPIAccess || echo "Permission set assignment completed or skipped"
        working-directory: ./volunteer-registration
        continue-on-error: true

      # Display deployment summary
      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🔗 Org URL: $(sf org display --verbose | grep 'Instance Url' | cut -d' ' -f3)"
        working-directory: ./volunteer-registration
